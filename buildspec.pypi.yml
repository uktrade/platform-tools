version: 0.2

env:
  shell: bash
  parameter-store:
    PYPI_TOKEN: "pypi-token"
    SLACK_TOKEN: "/codebuild/slack_oauth_token"
    SLACK_CHANNEL_ID: "/codebuild/slack_platform_helper_publish_oauth_channel"

phases:
  install:
    commands:
      - echo -e "\nSetting local Python versions"
      - pyenv versions | awk 'match($0, /[0-9]\.[0-9]+\.[0-9]+/) { print substr($0, RSTART, RLENGTH) }' | tac > .python-version
      - |
        echo -e "\nCheck we are using the latest installed Python 3.x"
        python --version
      - echo -e "\nInstalling dependencies"
      - pip install poetry
      - poetry install
      - pip install dbt-platform-helper

  build:
    commands:
      - echo -e "\nBuild and publish to PyPi"
      - ./publish_to_pypi.sh ${PYPI_TOKEN} ${SLACK_TOKEN} ${SLACK_CHANNEL_ID}

  post_build:
    commands:
      - echo -e "\nBuild and publish deploy tools image"
      - PLATFORM_HELPER_VERSION=($(python utils/check_pypi.py --version))
      - VERSION_NUMBER=${PLATFORM_HELPER_VERSION[1]}
      - docker build --build-arg PLATFORM_HELPER_VERSION=$VERSION_NUMBER -t public.ecr.aws/uktrade/platform-deploy-tools:$VERSION_NUMBER ./images/tools/deploy
      - docker tag public.ecr.aws/uktrade/platform-deploy-tools:$VERSION_NUMBER public.ecr.aws/uktrade/platform-deploy-tools:latest
      - echo "\nBuild platform-deploy-tools image for $VERSION_NUMBER completed on $(date)"
